name: public-ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  public-envelope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check public shell scripts parse
        run: |
          bash -n scripts/prepare-public-run.sh
          bash -n scripts/doctor.sh
          bash -n scripts/first-success.sh

      - name: Check Rust formatting
        run: cargo fmt --manifest-path free/v0.1/0/Cargo.toml --all -- --check

      - name: Check Rust workspace
        run: cargo check --manifest-path free/v0.1/0/Cargo.toml --workspace --all-targets

      - name: Check Rust lint
        run: cargo clippy --manifest-path free/v0.1/0/Cargo.toml --workspace --all-targets -- -D warnings

      - name: Prepare public first-success state
        run: ./scripts/prepare-public-run.sh

      - name: Check public first-success path
        run: |
          ./scripts/doctor.sh
          ./scripts/first-success.sh

      - name: Check Rust tests
        run: cargo test --manifest-path free/v0.1/0/Cargo.toml --workspace --all-targets
